<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Louro Support - Tecnologia & Design</title>
    <style>
        /* Estilo para garantir que a imagem ocupe a tela corretamente */
        body { margin: 0; padding: 0; background-color: #05192d; display: flex; justify-content: center; overflow-x: hidden; }
        .container { position: relative; width: 100%; max-width: 500px; }
        img { width: 100%; height: auto; display: block; }
        
        /* Áreas clicáveis invisíveis sobre os botões da sua arte */
        .btn { position: absolute; cursor: pointer; background: rgba(255,255,255,0); border-radius: 20px; }
        
        /* Posições aproximadas para os seus botões - Calibradas pela sua arte */
        .btn-manutencao { top: 54.5%; left: 10%; width: 80%; height: 6.5%; }
        .btn-design     { top: 62.5%; left: 10%; width: 80%; height: 6.5%; }
        .btn-cartao     { top: 70.5%; left: 10%; width: 80%; height: 6.5%; }
        .btn-contato    { top: 78.5%; left: 10%; width: 80%; height: 6.5%; }
        .btn-local      { top: 86.5%; left: 10%; width: 80%; height: 6.5%; }
    </style>
</head>
<body>

<div class="container">
    <img src="cartao.jpg" alt="Louro Support Cartão Virtual">

    <!-- Substitua os '#' pelos seus links reais abaixo -->
    <a href="https://wa.me/SEU_NUMERO" class="btn btn-manutencao" title="Manutenção"></a>
    <a href="https://wa.me/SEU_NUMERO" class="btn btn-design" title="Design"></a>
    <a href="https://wa.me/SEU_NUMERO" class="btn btn-cartao" title="Fazer Cartão"></a>
    <a href="#" class="btn btn-contato" title="Salvar Contato"></a>
    <a href="https://goo.gl/maps/SUA_LOCALIZACAO" class="btn btn-local" title="Localização"></a>
</div>

</body>
</html>
